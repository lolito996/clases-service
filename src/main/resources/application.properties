spring.application.name=clases-service
server.port=8082

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:clasesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL del servicio de equipos
equipment.service.url=http://localhost:8081

# URL del servicio de entrenadores
trainer.service.url=http://localhost:8085

# Required for Swagger UI static resources
spring.web.resources.add-mappings=true

# ==================== KEYCLOAK / OAuth2 Security ====================
# (Se usa en OpenApiConfig para construir el tokenUrl de Swagger)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/gimnasio
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/gimnasio/protocol/openid-connect/certs

# ==================== SWAGGER / OPENAPI ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method

# ==================== KAFKA ====================
spring.kafka.bootstrap-servers=localhost:29092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=monitoreo-grupo
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.analisys.gimnasio.clases_service.kafka


# ==================== RABBITMQ ====================
app.rabbitmq.enabled=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=gimnasio
spring.rabbitmq.password=gimnasio123

